<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>影片管理</title>
		<link rel='stylesheet' type="text/css" href='__STATIC__/plugins/layui/css/layui.css'>
		<script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"> </script>
		<style type="text/css">
		    .header span{background: #009688;margin-left: 30px;padding:10px;color:#ffffff;}
		    .header div{border-bottom:solid 2px #009688;margin-top: 8px;}
		    .header button{float:right; margin-top: -5px;}
		</style>
	</head>
	<body style="padding:10px;">
		<div class="header">
		    <span>影片列表</span>
		    <button class="layui-btn layui-btn-sm" onclick="add()">添加</button>
		    <div></div>
		</div>
		
		<table class="layui-table">
		    <thead>
		        <tr>
		            <th>ID</th>
		            <th>频道</th>
		            <th>资费</th>
		            <th>地区</th>
		            <th>名称</th>
					<th>PV</th>
					<th>评分</th>
					<th>状态</th>
		            <th>添加时间</th>
		            <th>操作</th>
		        </tr>
		    </thead>
		    <tbody>
		        {volist name="data.data.lists" id="vo"}
		            <tr>
		                <td>{$vo.id}</td>
		                <td>{$vo.channel_id}</td>
		                <td>{$vo.charge_id}</td>
						<td>{$vo.area_id}</td>
						<td>{$vo.title}</td>
						<td>{$vo.pv}</td>
						<td>{$vo.score}</td>
		                <td>{$vo.status == 0 ?'<span style="color:red;">下线</span>':'发布'}</td>
		                <td>{:date('Y-m-d H:i:s',$vo.add_time)}</td>
		                <td>
		                    <button class="layui-btn layui-btn-xs" onclick="add({$vo.id})">编辑</button>
		                    <button class="layui-btn layui-btn-danger layui-btn-xs" onclick="del({$vo.id})">删除</button>
		                </td>
		            </tr>
		        {/volist}
		    </tbody>
		</table>
		
		<script>
		    layui.use(['layer','laypage'],function(){
		        layer = layui.layer;
		        $ = layui.jquery;
				laypage = layui.laypage;
		    });
		
		    // 添加编辑
		    function add(id){
		         layer.open({
		            type: 2,
		            title: id>0?"编辑影片":"添加影片",
		            shade: 0.3,
		            area: ['800px','500px'],
		            content: '/admins.php/admins/vedio/add?id='+id
		        });
		    }
			// 删除
			function del(id){
			   layer.confirm('确定要删除吗？', {
				    icon:3,
					btn: ['确定', '取消'] //按钮
				  }, function(){
					 $.post("/admins.php/admins/vedio/delete",{'id':id},function(res){
						 if(res.code > 0){
						     layer.alert(res.msg,{'icon':2});
						 }else{
						     layer.msg(res.msg,{'icon':1});
						     setTimeout(function(){parent.window.location.reload();},1000);
						 }
					 },'json');
				  });
			}
		</script>
	</body>
</html>
