<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加影片</title>
     <link rel='stylesheet' type="text/css" href='__STATIC__/plugins/layui/css/layui.css'>
    <script type="text/javascript" src="__STATIC__/plugins/layui/layui.js"> </script>
</head>
<body style="padding: 10px;">
    <form class="layui-form">
		<input type="hidden" name="id" value="{$data.item.id}">
        <div class="layui-form-item">
            <label class="layui-form-label">影片名称</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" name="title" value="{$data.item.title}"/>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">频&nbsp;&nbsp;&nbsp;&nbsp;道</label>
            <div class="layui-input-inline">
                 <select name="channel_id">
					 <option value='0'>请选择</option>
					 {volist name="data.channel" id="vo"}
					 <option value="{$vo.id}" <?php if($data['item']['channel_id'] == $vo['id']){echo 'selected';}?>
						 >{$vo.title}</option>
					 {/volist}
				 </select>
            </div>
			
			<label class="layui-form-label">资&nbsp;&nbsp;&nbsp;&nbsp;费</label>
			<div class="layui-input-inline">
			    <select name="charge_id">
			    	<option value="0">请选择</option>		 
					{volist name="data.charge" id="vo"}
					<option value="{$vo.id}" <?php if($data['item']['charge_id'] == $vo['id']){echo 'selected';}?>>{$vo.title}</option>
					{/volist}
			    </select>
			</div>
        </div>
		<div class="layui-form-item">
		    <label class="layui-form-label">地&nbsp;&nbsp;&nbsp;&nbsp;区</label>
		    <div class="layui-input-inline">
		        <select name="area_id">
		        	<option value="0">请选择</option>
		        	{volist name="data.area" id="vo"}
		        	<option value="{$vo.id}" <?php if($data['item']['area_id'] == $vo['id']){echo "selected";}?>>{$vo.title}</option>
		        	{/volist}				 
		        </select>
		    </div>
			<label class="layui-form-label">&nbsp;</label>
			<div class="layui-input-inline">
				<button class="layui-btn layui-btn-sm" onclick="return false;" id="upload_img">
					<i class="layui-icon">&#xe67c;</i>上传图片
				</button>
				<img id="pre_img" <?php if($data['item']['img']){echo 'src="'.$data['item']['img'].'"';}?> style="height:30px;"/>
				<input type="hidden" name="img" value="{$data.item.img}">
			</div>
		</div>
        <div class="layui-form-item">
            <label class="layui-form-label">影片地址</label>
            <div class="layui-input-block">
                <input type="text" name="url" class="layui-input" value="{$data.item.url}"/>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">关键字</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" name="keywords" value="{$data.item.keywords}"/>
            </div>
        </div>
		<div class="layui-form-item">
		    <label class="layui-form-label">描述</label>
		    <div class="layui-input-block">
		        <input type="text" class="layui-input" name="desc" value="{$data.item.desc}" />
		    </div>
		</div>
		<div class="layui-form-item">
		    <label class="layui-form-label">状态</label>
		    <div class="layui-input-block">
		        <input type="checkbox" layui-skin="primary" name="status" {$data.item.status==1?'checked':''} title="发布" value="1"/>
		    </div>
		</div>
    </form>
    <div class="layui-form-item">
            <div class="layui-input-block">
                <button class="layui-btn" onclick="save()">保存</button>
            </div>
    </div>

    <script type="text/javascript">
        layui.use(['layer','form','upload'],function(){
            layer = layui.layer;
            form = layui.form;
            $ = layui.jquery;
			var upload = layui.upload;
			 //执行实例
			var uploadInst = upload.render({
				elem: '#upload_img', //绑定元素
				url: '/admins.php/admins/vedio/upload_img', //上传接口
				accept:'images',
				done: function(res){
				  //上传完毕回调
				  $('#pre_img').attr('src',res.msg);
				  $('input[name="img"]').val(res.msg);
				},
				error: function(){
				  //请求异常回调
				}
		  });
        })

        // 保存
        function save(){
            var title = $.trim($('input[name="title"]').val());
            var url = $.trim($('input[name="url"]').val());
            if(title == ''){
                layer.msg('请输入影片名称', {'icon':2,'anim':6});
                return;
            }
            if(url == ''){
                layer.msg('请输入影片地址', {'icon':2,'anim':6});
                return;
            }
            $.post('/admins.php/admins/vedio/save',$('form').serialize(),function(res){
                if(res.code > 0){
                    layer.alert(res.msg,{'icon':2,'anim':2});
                }else{
                    layer.msg(res.msg,{'icon':1});
                    setTimeout(function(){parent.window.location.reload();},1000);
                }
            },'json');
        }
    </script>
</body>
</html>
